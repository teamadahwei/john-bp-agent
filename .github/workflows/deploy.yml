name: John BP Agent — CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax — all Python files
        run: |
          python -m py_compile main.py
          python -m py_compile agent.py
          python -m py_compile database.py
          python -m py_compile alerts.py
          python -m py_compile groq_client.py
          echo "All files syntax OK"

      - name: Test package imports
        run: |
          python -c "import fastapi; print('FastAPI', fastapi.__version__)"
          python -c "import groq; print('Groq SDK OK')"
          python -c "import psycopg2; print('PostgreSQL OK')"
          python -c "import twilio; print('Twilio OK')"
          python -c "import openai; print('OpenAI SDK OK')"
          python -c "import apscheduler; print('APScheduler OK')"

      - name: Verify required files exist
        run: |
          test -f main.py      && echo "main.py found"
          test -f agent.py     && echo "agent.py found"
          test -f database.py  && echo "database.py found"
          test -f alerts.py    && echo "alerts.py found"
          test -f .env.example && echo ".env.example found"
          test -f Procfile     && echo "Procfile found"
          test ! -f .env       && echo "PASS: .env not committed"

      - name: Security check — no secrets in code
        run: |
          grep -r "gsk_" . --include="*.py" && echo "FAIL: Groq key found" && exit 1 || echo "PASS: No Groq key in code"
          grep -r "AC[a-zA-Z0-9]{32}" . --include="*.py" && echo "FAIL: Twilio SID found" && exit 1 || echo "PASS: No Twilio SID in code"