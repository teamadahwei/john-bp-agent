name: John BP Agent — CI Pipeline
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax — all Python files
        run: |
          python -m py_compile main.py
          python -m py_compile app/agent.py
          python -m py_compile app/database.py
          python -m py_compile app/alerts.py
          python -m py_compile app/groq_client.py
          echo "All files syntax OK"

      - name: Test package imports
        run: |
          python -c "import fastapi; print('FastAPI', fastapi.__version__)"
          python -c "import groq; print('Groq SDK OK')"
          python -c "import psycopg2; print('PostgreSQL OK')"
          python -c "import twilio; print('Twilio OK')"
          python -c "import openai; print('OpenAI SDK OK')"
          python -c "import apscheduler; print('APScheduler OK')"

      - name: Verify required files exist
        run: |
          test -f app/main.py      && echo "main.py found"
          test -f app/agent.py     && echo "agent.py found"
          test -f app/database.py  && echo "database.py found"
          test -f app/alerts.py    && echo "alerts.py found"
          test -f .env.example     && echo ".env.example found"
          test ! -f .env           && echo "PASS: .env not committed"

      - name: Security check — no secrets in code
        run: |
          grep -r "gsk_" app/ --include="*.py" && echo "FAIL: Groq key found" && exit 1 || echo "PASS: No Groq key"
          echo "PASS: Security check complete"
          
  
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
      
    steps:
      - name: Trigger Render Deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          echo "Render deployment triggered!"
        